name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/secret-scan.sh

  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # The renderer (electron/renderer-vite/) is the entire product UI and had
      # NO lint and NO typecheck in any automation until these two steps existed.
      # Both install the renderer's own node_modules on first use, and both use
      # the renderer's own configs (its eslint.config.mjs and tsconfig.json); the
      # root eslint config still ignores electron/** on purpose.
      - run: npm run lint:renderer
      - run: npm run typecheck:renderer
      - run: npm run build:lib
      - run: node --check dist/lib/sessions.js && node --check dist/lib/pulse.js && node --check dist/lib/commands.js && node --check dist/lib/span.js && node --check dist/lib/pricing.js && node --check dist/lib/harness-icons.js && node --check dist/lib/summary-budget.js && node --check dist/lib/claude-quota.js && node --check dist/bin/humanctl.js && node --check dist/electron/main.js && node --check dist/electron/preload.js && node --check dist/electron/reader-service.js
      - run: npm run pulse:selftest
      - run: npm run reader:selftest
      - run: npm run commands:selftest
      # Pure parser + orchestration for the Claude quota read (lib/claude-quota.ts).
      # Zero process spawns by construction: every case replays captured stdout
      # through an injected runner, so CI never invokes the `claude` CLI.
      - run: npm run quota:selftest
      # electron/reader-service.ts's request/reply dispatch, transport
      # handshake, and unknown-cmd handling. Fakes process.parentPort with a
      # plain EventEmitter, so it never needs a real Electron utilityProcess.
      - run: npm run reader-service:selftest
      # lib/span.ts's daily span-of-control counts (codex/claude split, notes
      # by level, missing-source-is-null contract) and the span.jsonl upsert.
      # Empties PATH for its own process so it never spawns a real `gh`.
      - run: npm run span:selftest
      # Pure-logic perf checks only (watcher filter, budget math, icon-path
      # resolution, PR-chip cache contract): CI has no display server, so the
      # real perf:selftest (a live Electron + CDP gate) is LOCAL-only, run
      # before release via npm run app:install. See docs/perf.md.
      - run: npm run perf:logic-selftest
      # Renderer bundle budget. This one DOES run in CI: it needs only a browser
      # `vite build`, no Electron window and no display server. See docs/perf.md.
      - run: npm run bundle:check
      # docs/design-system.md section 10, gate 1: parses globals.css, converts
      # every authored oklch to sRGB, asserts gamut, composites alpha
      # source-over in sRGB, and asserts the full section 1.8 colour contract
      # (ink ladder, hue contrast/soft pairs, solid-fill hover/press, the
      # hairline, the focus ring, and the selected-beats-hover orderings).
      # Pure Node + tsx, no browser, no display server.
      - run: npm run tokens:check
      # docs/design-system.md section 10, gate 3: a plain-text grep over a
      # denylist of retired class names (bg-accent, text-muted-foreground,
      # border-border, bg-sidebar-*, shadow-(xs|md|lg|2xl)). Tailwind drops
      # an unknown class silently rather than erroring, so this is the only
      # thing that would catch a magenta-canary-retired class name (#68)
      # sneaking back into a diff as a no-op. See scripts/design-lint-classnames.js's
      # header for why rounded-(sm|md|lg) is deliberately not in this pass yet.
      - run: npm run lint:classnames
      - run: npm run build
