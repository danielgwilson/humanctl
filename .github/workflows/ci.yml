name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/secret-scan.sh

  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: node --check lib/sessions.js && node --check lib/pulse.js && node --check lib/commands.js && node --check lib/span.js && node --check lib/harness-icons.js && node --check lib/summary-budget.js && node --check bin/humanctl.js
      - run: npm run pulse:selftest
      - run: npm run reader:selftest
      - run: npm run commands:selftest
      # Pure-logic perf checks only (watcher filter, budget math, icon-path
      # resolution, PR-chip cache contract): CI has no display server, so the
      # real perf:selftest (a live Electron + CDP gate) is LOCAL-only, run
      # before release via npm run app:install. See docs/perf.md.
      - run: npm run perf:logic-selftest
      - run: npm run build
