name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify release tag and current main head
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "release tag $GITHUB_REF_NAME does not match package version $version"
            exit 1
          fi
          git fetch origin main
          tag_commit=$(git rev-parse "$GITHUB_REF_NAME^{commit}")
          main_commit=$(git rev-parse origin/main)
          if [ "$tag_commit" != "$main_commit" ]; then
            echo "release tag must point to the current origin/main head"
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - run: bash scripts/secret-scan.sh
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run lint:renderer
      - run: npm run typecheck:renderer
      - run: npm run pulse:selftest
      - run: npm run reader:selftest
      - run: npm run commands:selftest
      - run: npm run quota:selftest
      - run: npm run reader-service:selftest
      - run: npm run span:selftest
      - run: npm run perf:logic-selftest
      - run: npm run bundle:check
      - run: npm run tokens:check
      - run: npm run lint:classnames
      - run: npm run build
      - run: npm run package:check
      - run: npm run publish:check
      - run: npm publish --provenance --access public
