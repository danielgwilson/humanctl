name: HumanctlNotch
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
targets:
  HumanctlNotch:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: HumanctlNotch/App
      - path: HumanctlNotch/Shell
      - path: HumanctlNotch/Support
      - path: HumanctlNotch/Views
      - path: HumanctlNotch/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.humanctl.notch-spike
        PRODUCT_NAME: HumanctlNotch
        INFOPLIST_FILE: HumanctlNotch/App/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_STYLE: Automatic
