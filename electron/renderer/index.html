<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; script-src 'self';" />
<title>humanctl</title>

<!-- ===== TOKENS (ported from shared kit; fonts are LOCAL stacks only, no network) ===== -->
<style id="kit-tokens">
:root{
  /* canvas, dark-first premium near-black */
  --bg:#0a0c10; --bg2:#0d1016; --panel:#141821; --panel2:#171c26;
  --rule:#222836; --rule2:#2b3444;
  --ink:#eef1f6; --ink2:#a7b0bf; --ink3:#8b93a3; --ink4:#7d89a0;
  --iris:#8b89f7; --iris-dim:#6f6ddb;
  --disp:'Space Grotesk',-apple-system,system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;

  /* semantic hues, one per axis (color = meaning only, never decoration) */
  --s-work:#33c98d; --s-need:#f5b73d; --s-block:#f0603f; --s-idle:#7b8598; --s-done:#4db6f0;
  --h-codex:#f0883e; --h-claude:#b07cf5;

  /* context-map kind hues */
  --k-user:var(--iris); --k-assistant:var(--s-done); --k-thinking:var(--h-claude);
  --k-tool-call:var(--s-need); --k-tool-result:var(--s-work); --k-meta:var(--ink4);

  /* spacing scale (4px base) */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px;
  --r1:6px; --r2:9px; --r3:13px;

  /* chip flood (quiet, considered) */
  --chip-mix:15%; --chip-ink:78%;

  --hdr-h:52px;      /* header height; the nav strip starts BELOW this */
  --nav-w:220px;     /* nav strip width when hover-expanded/pinned */
  --nav-w-icon:52px; /* nav strip width when collapsed to icons (the default) */
  --ctxbar-h:30px;   /* bottom context bar height */
}
body.light{
  --bg:#f4f5f8; --bg2:#eceef3; --panel:#ffffff; --panel2:#f7f8fb; --rule:#e2e6ee; --rule2:#d3d9e4;
  --ink:#12151c; --ink2:#454c5a; --ink3:#5c6373; --ink4:#5f6674;
}
*{box-sizing:border-box}
html,body{margin:0}
body{ background:var(--bg); color:var(--ink); font-family:var(--disp); -webkit-font-smoothing:antialiased; letter-spacing:-.005em; height:100vh; overflow:hidden; }
svg{display:block}

/* the one shared chip component. one strict color map. */
.chip{ font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:.02em; padding:2px 7px; border-radius:5px;
  display:inline-flex; align-items:center; gap:5px; line-height:1.4; white-space:nowrap;
  background:color-mix(in srgb, var(--c) var(--chip-mix), transparent);
  color:color-mix(in srgb, var(--c) var(--chip-ink), var(--ink));
  border:1px solid color-mix(in srgb, var(--c) calc(var(--chip-mix) + 8%), transparent); }
.chip .dt{ width:5px; height:5px; border-radius:50%; background:var(--c) }
.c-work{--c:var(--s-work)} .c-need{--c:var(--s-need)} .c-block{--c:var(--s-block)}
.c-idle{--c:var(--s-idle)} .c-done{--c:var(--s-done)}
.c-codex{--c:var(--h-codex)} .c-claude{--c:var(--h-claude)}

/* neutral built-in harness glyph. Shape distinguishes harness, not vendor art;
   a faint hue accent only, never the identity signal. */
.hglyph{ font-family:var(--mono); font-size:12px; line-height:1; flex:0 0 auto; }
.hglyph.g-claude{ color:var(--h-claude); }
.hglyph.g-codex{ color:var(--h-codex); }
.hglyph.hicon{ display:inline-flex; align-items:center; }
.hglyph.hicon img{ width:16px; height:16px; border-radius:4px; display:block; }

/* deterministic id-tag appended when two visible names collide */
.idtag{ font-family:var(--mono); font-size:.72em; font-weight:500; color:var(--ink4); margin-left:4px; letter-spacing:.04em; }

/* attention tiers. drifting recedes; archived recedes further. Hover restores. */
.srow.drift, .qrow.drift{ opacity:.55; }
.srow.archived{ opacity:.4; }
.srow.drift:hover, .qrow.drift:hover, .srow.archived:hover{ opacity:.85; }
</style>

<!-- ===== A11Y BASE (0.16.1): one visible focus ring for every interactive
     element, everywhere, plus the reduced-motion gate and native-control
     resets. DESIGN.md's new "no OS-default controls" rule leans on this: a
     single :focus-visible contract so a bespoke component never has to
     reinvent its own ring. Keyboard focus only (mouse/touch clicks never show
     it), via :focus-visible, which every target browser here supports. ===== -->
<style id="a11y-base">
:focus{ outline:none; }
:focus-visible{
  outline:2px solid var(--iris); outline-offset:2px; border-radius:4px;
}
/* Rows, chips, and other flat elements the ring would otherwise clip against
   sit close enough to the ring color already (border-radius above matches
   their own radius in most cases); tighten offset where the element already
   carries a visible border so the ring reads as one continuous frame instead
   of two nested boxes. */
.srow:focus-visible, .nav-item:focus-visible, .ctxitem:focus-visible,
.pk-item:focus-visible, .resume-menu button:focus-visible{ outline-offset:-2px; }
button, .btn, [role="button"], [tabindex]{ -webkit-tap-highlight-color:transparent; }
/* Every interactive control gets an honest minimum hit target (a11y pass:
   "hit targets at least ~28px in the smaller dimension"), even where its
   visible glyph is smaller. Padding-box sizing keeps the visual size intact;
   this only guarantees the clickable/tappable box beneath it. */
.icon-btn, .crumb-pin, .atlas-hd .close, .disc-tog{ min-width:28px; min-height:28px; }
.pinbtn{ display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; }

@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ animation:none !important; transition:none !important; }
}
</style>

<!-- ===== SHELL LAYOUT (shell v2: nav rail overlay + one active view + detail overlay + Atlas drawer) ===== -->
<style id="shell">
.app{ height:100vh; display:grid; grid-template-rows:var(--hdr-h) 1fr var(--ctxbar-h); }

/* ---------- HEADER (slim: wordmark + version + sidebar-toggle icon only; the
   drag region for the frameless window). Digest, resources, and theme/settings
   controls do NOT live here (one-owner rule: digest -> bottom bar, resources ->
   Metrics, settings/theme -> the user picker at the foot of the nav strip). ---------- */
.hdr{
  display:flex; align-items:center; gap:var(--s3);
  height:var(--hdr-h); padding:0 var(--s5) 0 80px;   /* left inset clears the macOS traffic lights */
  background:var(--bg2); border-bottom:1px solid var(--rule);
  min-width:0; overflow:hidden;
  -webkit-app-region:drag; user-select:none;
}
.hdr .seg, .hdr .ctl, .hdr button, .hdr .brand{ -webkit-app-region:no-drag; }
.hdr .brand{ display:flex; align-items:baseline; gap:var(--s2); flex:0 0 auto; }
.hdr .brand .mk{ font-weight:700; font-size:15px; letter-spacing:-.02em; }
.hdr .brand .mk b{ color:var(--iris); }
.hdr .brand .tag{ font-family:var(--mono); font-size:9px; color:var(--ink3); letter-spacing:.08em; text-transform:uppercase; }
.hdr .brand .demo{ font-family:var(--mono); font-size:8.5px; color:var(--s-need); letter-spacing:.06em; text-transform:uppercase;
  border:1px solid color-mix(in srgb, var(--s-need) 40%, transparent); border-radius:4px; padding:1px 5px; }

.hdr .spacer{ flex:1 1 auto; }

.hdr .ctl{ display:flex; gap:var(--s2); align-items:center; flex:0 0 auto; }
.hdr .ctl button{
  font-family:var(--mono); font-size:9px; letter-spacing:.05em; text-transform:uppercase;
  background:transparent; color:var(--ink3); border:1px solid var(--rule2);
  border-radius:5px; padding:5px 9px; cursor:pointer; transition:.12s;
}
.hdr .ctl button:hover{ color:var(--ink); border-color:var(--ink4); }
/* sidebar-toggle icon button (replaces the old "ATLAS" text button). Standard
   right-rail glyph, no label; the CoS drawer is the only thing it opens. */
.icon-btn{ display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; padding:0 !important; }
.icon-btn svg{ width:15px; height:15px; }
#btnRightRail.on{ color:var(--iris); border-color:var(--iris-dim); }

/* ---------- NAV STRIP: a VISIBLE icon strip by default (0.15.0's fully-hidden
   rail was the mistake; Daniel could not find it). Collapsed width shows just
   glyphs + the unread badge; hovering the strip itself (150ms intent) expands
   it to show labels as an overlay; Cmd+\ pins the widened rail as a fixed
   column. Keys 1/2/3/4 still switch views. A user/settings picker anchors the
   foot of the strip (Codex/Claude-Code sidebar-footer style). ---------- */
.nav-rail{
  /* bottom stops ABOVE the context bar (never covers it, even pinned/expanded);
     the context bar stays a full-bleed, always-visible strip per DESIGN.md
     (digest's sole home must never be obscured by chrome above it). The rail
     itself is never translated off-screen in this shell-v3 model (unlike the
     old shell-v2 hidden rail this replaces) -- it always occupies
     --nav-w-icon at minimum, so the box-shadow-bleeds-through-a-transform bug
     fixed for that old model (2026-07 real-use feedback) cannot recur here:
     the base/collapsed state below carries no box-shadow at all, only the
     open-overlay state adds one, and it is removed again once pinned. */
  position:fixed; left:0; top:var(--hdr-h); bottom:var(--ctxbar-h); width:var(--nav-w-icon); z-index:60;
  background:var(--panel); border-right:1px solid var(--rule2);
  transition:width .16s cubic-bezier(.2,.7,.2,1), box-shadow .16s;
  display:flex; flex-direction:column; padding:var(--s3) var(--s2); gap:2px; overflow:hidden;
}
/* Hover-expanded (overlay: widens over the content, does not push it) or
   pinned (widens AND pushes .stage over, see body.nav-pinned below). */
body.nav-open .nav-rail{ width:var(--nav-w); box-shadow:12px 0 40px -18px rgba(0,0,0,.55); }
body.nav-pinned .nav-rail{ box-shadow:none; }
.nav-item{ display:flex; align-items:center; gap:var(--s3); width:100%; text-align:left;
  font-family:var(--disp); font-size:13.5px; font-weight:600; color:var(--ink2);
  background:transparent; border:0; border-radius:var(--r1); padding:9px 0; cursor:pointer; position:relative; transition:.1s;
  white-space:nowrap; }
.nav-item:hover{ background:var(--panel2); color:var(--ink); }
.nav-item.on{ background:color-mix(in srgb, var(--iris) 16%, transparent); color:var(--ink); }
.nav-item.on .nav-glyph{ color:var(--iris); }
.nav-glyph{ font-size:14px; width:36px; flex:0 0 auto; text-align:center; }
.nav-label{ flex:1 1 auto; opacity:0; transition:opacity .1s; }
body.nav-open .nav-label{ opacity:1; }
.nav-key{ font-family:var(--mono); font-size:9px; color:var(--ink4); opacity:0; flex:0 0 auto; }
body.nav-open .nav-key{ opacity:1; }
.nav-badge{ font-family:var(--mono); font-size:8.5px; font-weight:600; color:#0a0c10; background:var(--iris);
  border-radius:999px; min-width:15px; height:15px; padding:0 4px; display:inline-flex; align-items:center; justify-content:center;
  position:absolute; left:24px; top:5px; }
body.nav-open .nav-badge{ position:static; margin-left:auto; }
body.light .nav-badge{ color:#fff; }
.nav-div{ height:1px; background:var(--rule); margin:var(--s2) 4px; }
.nav-fill{ flex:1 1 auto; }

/* Pinned: the rail is a fixed widened column that pushes the content over. */
body.nav-pinned .stage{ margin-left:var(--nav-w); }
body:not(.nav-pinned) .stage{ margin-left:var(--nav-w-icon); }
/* The bottom context bar sits BELOW the stage in the grid (its own row), so it
   needs the identical left inset applied directly (margin-left on .stage does
   not affect a grid sibling). Un-pinned, the icon strip's own width already
   reserves the same 52px whether hovered or not (hover only widens as an
   overlay, per .nav-open above, and does not affect layout), so the bar's
   inset stays constant at --nav-w-icon in that state; pinned, it matches the
   widened column. */
body.nav-pinned .ctxbar{ margin-left:var(--nav-w); }
body:not(.nav-pinned) .ctxbar{ margin-left:var(--nav-w-icon); }
.stage{ position:relative; min-height:0; height:100%; overflow:hidden; transition:margin-left .16s cubic-bezier(.2,.7,.2,1); }

/* ---------- USER / SETTINGS PICKER (foot of the nav strip; Codex/Claude-Code
   sidebar-footer style). Houses theme (light/dark/system), summary frequency,
   and "All settings" (routes to the existing settings view). Replaces the
   old top-right theme + settings controls (one owner: the picker). ---------- */
.nav-user{ flex:0 0 auto; margin-top:auto; padding-top:var(--s2); border-top:1px solid var(--rule); }
.nav-user-btn{ display:flex; align-items:center; gap:var(--s3); width:100%; text-align:left;
  background:transparent; border:0; border-radius:var(--r1); padding:8px 0; cursor:pointer; color:var(--ink2); }
.nav-user-btn:hover{ background:var(--panel2); color:var(--ink); }
.nav-user-btn .av{ flex:0 0 auto; width:36px; display:flex; align-items:center; justify-content:center; }
.nav-user-btn .av .dot{ width:20px; height:20px; border-radius:50%; background:var(--iris); color:#0a0c10;
  font-family:var(--mono); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; }
body.light .nav-user-btn .av .dot{ color:#fff; }
.nav-user-btn .nm{ flex:1 1 auto; font-family:var(--disp); font-size:12.5px; font-weight:600; opacity:0; transition:opacity .1s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
body.nav-open .nav-user-btn .nm{ opacity:1; }
.nav-user-btn .gear{ font-size:12px; color:var(--ink4); opacity:0; flex:0 0 auto; margin-right:4px; }
body.nav-open .nav-user-btn .gear{ opacity:1; }

.picker{ position:fixed; z-index:65; min-width:230px; background:var(--panel2); border:1px solid var(--rule2);
  border-radius:var(--r2); box-shadow:0 16px 40px -8px rgba(0,0,0,.55); padding:var(--s2); }
.picker[hidden]{ display:none; }
.picker .pk-sect{ padding:var(--s2) var(--s2) var(--s3); }
.picker .pk-l{ font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink4); margin-bottom:var(--s2); }
.picker .pk-row{ display:flex; align-items:center; justify-content:space-between; gap:var(--s2); }
.picker hr{ border:0; border-top:1px solid var(--rule); margin:2px 0; }
.pk-item{ display:flex; align-items:center; gap:var(--s2); width:100%; text-align:left; font-family:var(--disp); font-size:12.5px;
  color:var(--ink); background:transparent; border:0; border-radius:6px; padding:8px var(--s2); cursor:pointer; }
.pk-item:hover{ background:var(--iris); color:#0a0c10; }
body.light .pk-item:hover{ color:#fff; }

/* ---------- VIEWS ---------- */
.view{ position:absolute; inset:0; display:none; flex-direction:column; overflow:hidden; background:var(--bg); }
.view.on{ display:flex; }
.view-hd{ height:38px; flex:0 0 auto; display:flex; align-items:center; gap:var(--s2); padding:0 var(--s5); border-bottom:1px solid var(--rule); }
.view-hd .glyph{ font-size:13px; color:var(--iris); }
.view-hd .ttl{ font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink2); font-weight:600; }
.view-hd .sub{ font-family:var(--mono); font-size:9.5px; color:var(--ink4); margin-left:auto; white-space:nowrap; }
.view-hd .hdbtn{ font-family:var(--mono); font-size:9px; letter-spacing:.03em; color:var(--ink3); background:transparent;
  border:1px solid var(--rule2); border-radius:5px; padding:3px 8px; cursor:pointer; margin-left:var(--s3); white-space:nowrap; }
.view-hd .hdbtn:hover{ color:var(--ink); border-color:var(--ink4); }
.view-empty{ padding:var(--s6) var(--s5); font-family:var(--mono); font-size:12px; color:var(--ink3); line-height:1.6; }
.view-empty code{ background:var(--panel2); border-radius:4px; padding:1px 6px; }

/* ---------- STANDARDIZED INPUT BASE (0.16.1 controls + a11y pass). One
   shared contract for every text/number/search field in the app (toolbar
   search, ask/chat composers, budget numbers): consistent height, padding,
   radius, border, and placeholder color, so no field is styled ad hoc.
   :focus-visible carries the ring (see a11y-base above); the border-color
   change on focus is additional, not a replacement for the ring. Native
   number spinners are killed in favor of the plain field (no ugly OS
   up/down arrows breaking the app's flat surface language). ---------- */
.hc-input{ height:30px; font-family:var(--disp); font-size:12.5px; color:var(--ink); background:var(--bg2);
  border:1px solid var(--rule2); border-radius:var(--r1); padding:0 10px; outline:none; }
.hc-input:focus{ border-color:var(--iris); }
.hc-input::placeholder{ color:var(--ink4); }
.hc-input[type="number"]::-webkit-outer-spin-button,
.hc-input[type="number"]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
.hc-input[type="number"]{ -moz-appearance:textfield; }

/* toolbar (compact search + filters + sort; renderer ephemera) */
.toolbar{ flex:0 0 auto; display:flex; align-items:center; gap:var(--s2); padding:var(--s2) var(--s5); border-bottom:1px solid var(--rule); flex-wrap:wrap; }
.tb-search{ flex:1 1 200px; min-width:120px; }

/* ---------- BESPOKE SELECT (replaces every native <select> per DESIGN.md's
   "no OS-default controls" rule). A button trigger + an absolutely
   positioned popover listbox, styled to match contextmenu.js / the user
   picker's panel language (same panel2 bg, radius, rule, shadow, hover).
   Full keyboard + ARIA contract lives in the shared hc-select.js component;
   this is purely presentation. ---------- */
.hc-select{ position:relative; display:inline-flex; }
.hc-select-trigger{ height:30px; display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px;
  color:var(--ink2); background:var(--bg2); border:1px solid var(--rule2); border-radius:var(--r1); padding:0 8px 0 10px;
  cursor:pointer; white-space:nowrap; }
.hc-select-trigger:hover{ color:var(--ink); border-color:var(--ink4); }
.hc-select.open .hc-select-trigger{ border-color:var(--iris); color:var(--ink); }
.hc-select-trigger .hcs-val{ overflow:hidden; text-overflow:ellipsis; }
.hc-select-trigger .hcs-caret{ flex:0 0 auto; width:9px; height:9px; color:var(--ink4); transition:transform .12s; }
.hc-select.open .hcs-caret{ transform:rotate(180deg); color:var(--ink2); }
.hc-select-pop{ position:fixed; z-index:80; min-width:160px; max-height:280px; overflow-y:auto; background:var(--panel2);
  border:1px solid var(--rule2); border-radius:var(--r2); box-shadow:0 16px 40px -8px rgba(0,0,0,.55); padding:4px; }
.hc-select-pop[hidden]{ display:none; }
.hcs-opt{ display:flex; align-items:center; gap:8px; font-family:var(--disp); font-size:12.5px; color:var(--ink);
  padding:7px 10px; border-radius:6px; cursor:pointer; white-space:nowrap; }
.hcs-opt:hover, .hcs-opt.hi{ background:var(--iris); color:#0a0c10; }
body.light .hcs-opt:hover, body.light .hcs-opt.hi{ color:#fff; }
.hcs-opt .hcs-check{ flex:0 0 auto; width:12px; height:12px; opacity:0; }
.hcs-opt[aria-selected="true"] .hcs-check{ opacity:1; }

/* three-line rows (shared by Inbox + Sessions). No avatars, no context bars. */
.srows{ flex:1 1 auto; overflow-y:auto; }
.grp-hd{ display:flex; align-items:center; gap:var(--s2); height:26px; padding:0 var(--s5); margin-top:var(--s1);
  font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink3); font-weight:600; }
.grp-hd .gdot{ width:6px; height:6px; border-radius:50%; }
.grp-hd .gct{ margin-left:auto; color:var(--ink4); }
.srow{ display:grid; grid-template-columns:14px 1fr auto; align-items:start; gap:var(--s2);
  padding:var(--s3) var(--s5); cursor:pointer; border-left:2px solid transparent; border-bottom:1px solid var(--rule); }
.srow.dense{ padding:var(--s2) var(--s5); }
.srow:hover{ background:var(--panel); }
.srow.sel{ background:var(--panel2); border-left-color:var(--c-sel); }
.srow .unread{ width:7px; height:7px; border-radius:50%; background:transparent; margin-top:5px; position:relative; }
.srow .unread.on{ background:var(--iris); }
/* The unread dot is only tabbable (tabindex=0) when it is actually "on"
   (real informational content, per the dot-tooltip a11y pass): its own box is
   7px, too small to carry a legible focus ring on its own, so the ring is
   drawn on an invisible padded hit area centered on the dot instead of on the
   dot's true edges. */
.srow .unread[tabindex]::before{ content:''; position:absolute; inset:-7px; border-radius:50%; }
.srow .unread[tabindex]:focus-visible{ outline:none; }
.srow .unread[tabindex]:focus-visible::before{ outline:2px solid var(--iris); outline-offset:1px; }
.srow .sbody{ min-width:0; display:flex; flex-direction:column; gap:3px; }
.srow.dense .sbody{ gap:2px; }
.srow .l1{ display:flex; align-items:center; gap:var(--s2); min-width:0; }
.srow .l1 .nm{ font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1 1 auto; }
.srow .l1 .when{ font-family:var(--mono); font-size:9.5px; color:var(--ink4); flex:0 0 auto; }
.srow .l2{ display:flex; align-items:center; gap:var(--s2); min-width:0; }
.srow .l2 .msg{ font-size:11.5px; color:var(--ink3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1 1 auto; }
.srow .l3{ font-family:var(--mono); font-size:9px; color:var(--ink4); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.prchip{ font-family:var(--mono); font-size:9px; margin-left:8px; padding:1px 6px; border-radius:8px; border:1px solid currentColor; opacity:.85; }
.prchip.c-need{ color:var(--s-need); }
.prchip.c-done{ color:var(--s-done); }
.srow .pinbtn{ opacity:0; background:transparent; border:0; cursor:pointer; font-size:11px; line-height:1; padding:0;
  filter:grayscale(1) opacity(.75); transition:opacity .12s; align-self:flex-start; margin-top:2px; }
.srow:hover .pinbtn, .srow .pinbtn:focus-visible{ opacity:.5; }
.srow .pinbtn.on, .srow:hover .pinbtn.on{ opacity:1; filter:none; }
/* a11y: an opacity:0 control is unreachable for keyboard/screen-reader users
   until they tab onto it, at which point it must actually be visible enough
   to see the focus ring land somewhere real, not on an invisible 24px box. */
.srow .pinbtn:focus-visible{ opacity:1; filter:none; }

/* Inbox two-pane shell. The detail pane hosts the SAME .detail component the
   full-width overlay renders (renderer.js renderDetail, host 'inbPreview'),
   so it carries no padding of its own; the .detail wrapper supplies it. The
   aged-out fallback wraps itself in .prev-fallback instead. .inb-preview is a
   height-constrained flex column (NOT itself a scroll container) so the
   composer footer inside .detail can pin to its bottom; see the
   #detailWrap/.detail/.detail-scroll rules below for the shared column
   layout both hosts use. */
.inbox-shell{ height:100%; display:grid; grid-template-columns:340px 1fr; min-height:0; }
.inb-list{ display:flex; flex-direction:column; min-height:0; border-right:1px solid var(--rule); background:var(--bg2); }
.inb-preview{ display:flex; flex-direction:column; min-height:0; min-width:0; overflow:hidden; }
.prev-fallback{ padding:var(--s5); overflow-y:auto; min-height:0; flex:1 1 auto; }
.prev-hd{ display:flex; align-items:flex-start; gap:var(--s3); margin-bottom:var(--s4); }
.prev-hd .hglyph{ font-size:22px; margin-top:2px; }
.prev-meta h2{ font-size:19px; font-weight:700; margin:0; letter-spacing:-.02em; }
.prev-meta .prev-sub{ font-family:var(--mono); font-size:10.5px; color:var(--ink3); margin-top:var(--s1); }
.prev-note{ font-family:var(--mono); font-size:10.5px; color:var(--ink3); margin-bottom:var(--s3); }

/* placeholder views (quiet, honest, no fake data) */
.placeholder{ flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--s3); padding:var(--s6); text-align:center; }
.placeholder .ph-num{ font-family:var(--mono); font-size:44px; font-weight:600; color:var(--rule2); letter-spacing:.04em; }
.placeholder .ph-msg{ font-size:16px; font-weight:600; color:var(--ink2); }
.placeholder .ph-sub{ font-size:12.5px; color:var(--ink3); line-height:1.6; max-width:460px; }

/* Settings view */
.settings{ flex:1 1 auto; overflow-y:auto; padding:var(--s5); max-width:640px; }
.set-sect{ margin-bottom:var(--s6); }
.set-sect h4{ margin:0 0 var(--s2); font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink3); }
.set-sect .sub{ margin:0 0 var(--s3); font-size:12px; color:var(--ink2); line-height:1.45; }
.set-sect .note{ margin:var(--s3) 0 0; font-size:11px; color:var(--ink4); line-height:1.5; }
.set-row{ display:grid; grid-template-columns:130px 1fr; align-items:center; gap:var(--s3); margin-bottom:var(--s2); }
.set-row .sk{ font-family:var(--mono); font-size:11px; color:var(--ink2); }
.seg2{ display:inline-flex; border:1px solid var(--rule2); border-radius:var(--r1); overflow:hidden; }
.seg2 button{ font-family:var(--mono); font-size:10.5px; letter-spacing:.02em; background:transparent; color:var(--ink3);
  border:0; border-left:1px solid var(--rule2); padding:8px 14px; cursor:pointer; transition:.12s; }
.seg2 button:first-child{ border-left:0; }
.seg2 button:hover:not(:disabled){ color:var(--ink2); }
.seg2 button.on{ background:var(--iris); color:#0a0c10; }
body.light .seg2 button.on{ color:#fff; }
.seg2 button:disabled{ opacity:.35; cursor:default; }
.set-num{ font-family:var(--mono); font-size:12px; background:var(--panel2); width:100px; }

/* stat list (Metrics' Resources section: spend/tokens/quota, one owner) */
.gstats{ display:flex; flex-direction:column; border:1px solid var(--rule); border-radius:var(--r2); background:var(--panel); overflow:hidden; }
.gstat{ display:grid; grid-template-columns:minmax(0,1fr) auto; align-items:center; gap:var(--s3); min-height:38px; padding:var(--s1) var(--s4); border-bottom:1px solid var(--rule); }
.gstat:last-child{ border-bottom:0; }
.gstat .k{ font-family:var(--mono); font-size:10px; color:var(--ink3); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gstat .v{ display:flex; align-items:center; gap:var(--s2); font-size:14px; font-weight:600; justify-content:flex-end; white-space:nowrap; }

/* ---------- SESSION DETAIL (full-width overlay over the active view) ---------- */
/* Composer-cutoff fix (2026-07): the detail pane is a height-constrained flex
   column, never a single scrolling blob. #detailWrap and .detail no longer
   scroll themselves (that was the bug: a plain overflow-y:auto blob puts the
   composer wherever the content flow happens to end, below the fold on a
   long conversation or a short window). .detail-scroll is the ONE scrolling
   region (header + notes + summary + conversation + touched chips +
   disclosure); the askblock (ask-the-session composer + its suggested-reply
   row) is a sticky footer, a flex sibling of .detail-scroll, so it stays
   fully visible at any window height or conversation length. Verified at
   both 800px and 1000px window heights with a long fixture conversation. */
#detailWrap{ position:absolute; inset:0; display:none; background:var(--bg); overflow:hidden; }
#detailWrap.on{ display:flex; flex-direction:column; }
/* .detail is BOTH the static #detailBody element's own class (the overlay
   host) AND a wrapper div renderer.js injects inside #inbPreview (the Inbox
   host), so this one flex-column contract applies identically to both
   without duplicating it per host. */
.detail{ max-width:840px; width:100%; margin:0 auto; min-height:0; flex:1 1 auto; display:flex; flex-direction:column; overflow:hidden; }
.detail-scroll{ flex:1 1 auto; min-height:0; overflow-y:auto; padding:var(--s3) var(--s5) var(--s4); }
.detail-crumb{ display:flex; align-items:center; gap:var(--s3); padding:var(--s2) 0; }
.crumb-back{ font-family:var(--mono); font-size:11px; color:var(--ink2); background:transparent; border:1px solid var(--rule2);
  border-radius:var(--r1); padding:5px 11px; cursor:pointer; }
.crumb-back:hover{ color:var(--ink); border-color:var(--ink4); }
.crumb-live{ font-family:var(--mono); font-size:9.5px; color:var(--ink4); }
.crumb-live:not(:empty)::before{ content:''; display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--s-work); margin-right:6px; vertical-align:1px; animation:livepulse 2s ease-in-out infinite; }
.crumb-pin{ margin-left:auto; font-family:var(--mono); font-size:10px; color:var(--ink3); background:transparent;
  border:1px solid var(--rule2); border-radius:var(--r1); padding:5px 10px; cursor:pointer; filter:grayscale(1); }
.crumb-pin:hover{ color:var(--ink); border-color:var(--ink4); }
.crumb-pin.on{ color:var(--iris); border-color:var(--iris-dim); filter:none; }
.detail-hd{ display:flex; align-items:flex-start; gap:var(--s3); margin-top:var(--s2); }
.dh-id{ display:flex; align-items:flex-start; gap:var(--s3); flex:1 1 auto; min-width:0; }
.dh-id .hglyph{ font-size:26px; margin-top:2px; }
.dh-meta{ min-width:0; }
.dh-row1{ display:flex; align-items:center; gap:var(--s3); flex-wrap:wrap; }
.dh-row1 h1{ font-size:21px; font-weight:700; margin:0; letter-spacing:-.02em; }
.dh-sub{ font-family:var(--mono); font-size:10.5px; color:var(--ink3); margin-top:var(--s1); }

/* Resume split button (detail header top-right) */
.resume-split{ position:relative; display:inline-flex; flex:0 0 auto; }
.btn{ font-family:var(--disp); font-size:13px; font-weight:600; cursor:pointer; padding:var(--s2) var(--s4);
  border-radius:var(--r1); border:1px solid var(--rule2); background:var(--panel); color:var(--ink); display:inline-flex; align-items:center; gap:var(--s2); }
.btn:hover{ border-color:var(--ink4); }
.btn.primary{ background:var(--c-sel,var(--iris)); border-color:var(--c-sel,var(--iris)); color:#0a0c10; }
body.light .btn.primary{ color:#fff; }
.btn.primary:hover{ filter:brightness(1.08); }
.btn:disabled{ opacity:.4; cursor:default; }
.resume-split .caret{ margin-left:1px; padding:var(--s2) var(--s2); border-left:1px solid rgba(0,0,0,.2); border-top-left-radius:0; border-bottom-left-radius:0; }
.resume-split .btn:not(.caret){ border-top-right-radius:0; border-bottom-right-radius:0; }
.resume-menu{ position:absolute; top:calc(100% + 4px); right:0; z-index:20; min-width:200px; background:var(--panel2);
  border:1px solid var(--rule2); border-radius:var(--r2); box-shadow:0 16px 40px -8px rgba(0,0,0,.55); padding:4px; }
.resume-menu[hidden]{ display:none; }
.resume-menu button{ display:block; width:100%; text-align:left; font-family:var(--disp); font-size:12.5px; color:var(--ink);
  background:transparent; border:0; border-radius:6px; padding:7px 10px; cursor:pointer; }
.resume-menu button:hover{ background:var(--iris); color:#0a0c10; }
body.light .resume-menu button:hover{ color:#fff; }

/* the humanctl-updates stream (notes / detected asks / btw Q&A) */
.tstream{ display:flex; flex-direction:column; gap:var(--s3); margin-top:var(--s4); }
.tsitem{ padding:var(--s3) var(--s4); border:1px solid var(--rule); border-left:2px solid var(--il); border-radius:var(--r2); background:var(--panel); }
.tsitem .th2{ display:flex; align-items:center; gap:var(--s2); }
.tsitem .lvl{ font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; font-weight:600; color:var(--il); }
.tsitem .when2{ font-family:var(--mono); font-size:9.5px; color:var(--ink4); margin-left:auto; }
.tsitem .body2{ font-size:13px; color:var(--ink); line-height:1.5; margin-top:6px; white-space:pre-wrap; }
.tsimgs{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
.tsimg{ width:64px; height:64px; border-radius:var(--r2); border:1px solid var(--rule2); background:var(--panel2) center/cover no-repeat; cursor:pointer; transition:.12s; }
.tsimg:hover{ border-color:var(--iris); transform:scale(1.03); }
.tsitem .qtag{ font-family:var(--mono); font-size:9px; color:var(--ink4); text-transform:uppercase; letter-spacing:.06em; }
.tsitem .retry{ font-family:var(--mono); font-size:10px; color:var(--s-need); background:transparent; border:1px solid color-mix(in srgb, var(--s-need) 45%, transparent);
  border-radius:6px; padding:4px 10px; cursor:pointer; margin-top:8px; }

/* AI summary block */
.sumblock{ margin-top:var(--s4); padding:var(--s3) var(--s4); border:1px solid var(--rule); border-left:2px solid var(--iris);
  border-radius:var(--r2); background:var(--panel); }
.sumblock .lh{ display:flex; align-items:center; gap:var(--s3); }
.sumblock .lh .lbl{ font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--iris); font-weight:600; }
.sumblock .lh .meta{ font-family:var(--mono); font-size:10px; color:var(--ink4); margin-left:auto; }
.sumblock .txt{ font-size:13.5px; line-height:1.5; color:var(--ink); margin-top:var(--s2); white-space:pre-wrap; }
.sumblock.load .txt{ font-family:var(--mono); font-size:11px; color:var(--ink3); animation:sumpulse 1.6s ease-in-out infinite; }
.sumblock.err{ border-left-color:var(--s-block); }
.sumblock.err .lh .lbl{ color:var(--s-block); }
.sumblock.err .txt{ color:var(--ink2); font-size:12px; }
.sumblock.empty{ border-left-color:var(--rule2); }
.sumblock.flash{ animation:sumland .9s ease-out; }
.sum-trigger{ margin-top:var(--s2); font-family:var(--mono); font-size:10px; letter-spacing:.03em; color:var(--iris);
  background:transparent; border:1px solid var(--iris-dim); border-radius:var(--r1); padding:5px 11px; cursor:pointer; }
.sum-trigger:hover{ background:color-mix(in srgb, var(--iris) 10%, transparent); }
.sum-trigger:disabled{ opacity:.4; cursor:default; }
@keyframes sumpulse{ 0%,100%{ opacity:1 } 50%{ opacity:.45 } }
@keyframes sumland{ 0%{ background:color-mix(in srgb, var(--iris) 16%, var(--panel)); } 100%{ background:var(--panel); } }

/* conversation timeline (real substantive events; upward infinite scroll) */
.tl-wrap{ margin-top:var(--s4); }
.tl-head{ display:flex; align-items:baseline; gap:var(--s2); margin:0 0 8px; }
.tl-head .lbl{ font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink3); font-weight:600; }
.tl-live{ font-family:var(--mono); font-size:9.5px; color:var(--ink4); margin-left:auto; }
.tl-live:not(:empty)::before{ content:''; display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--s-work); margin-right:6px; vertical-align:1px; animation:livepulse 2s ease-in-out infinite; }
@keyframes livepulse{ 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
#tlBody{ max-height:420px; overflow-y:auto; }
.tl{ position:relative; padding-left:var(--s5); }
.tl::before{ content:''; position:absolute; left:6px; top:4px; bottom:4px; width:1px; background:var(--rule); }
.tevt{ position:relative; padding:var(--s2) 0; }
.tevt::before{ content:''; position:absolute; left:-21px; top:9px; width:7px; height:7px; border-radius:50%; background:var(--src); box-shadow:0 0 0 3px var(--bg); }
.tevt .top{ display:flex; align-items:baseline; gap:var(--s2); }
.tevt .src{ font-family:var(--mono); font-size:9px; letter-spacing:.06em; text-transform:uppercase; color:var(--src); font-weight:600; }
.tevt .ts{ font-family:var(--mono); font-size:9.5px; color:var(--ink4); margin-left:auto; }
.tevt .msg{ font-size:12px; color:var(--ink2); line-height:1.4; margin-top:2px; overflow-wrap:anywhere; }
.tl-empty{ font-family:var(--mono); font-size:11px; color:var(--ink4); padding:var(--s2) 0; }
.tl-more{ padding:var(--s2) 0; }
.tl-more button{ font-family:var(--mono); font-size:10px; letter-spacing:.04em; color:var(--ink3);
  background:none; border:1px dashed var(--rule2); border-radius:var(--r2); padding:6px 12px; width:100%; text-align:left; cursor:pointer; }
.tl-more button:hover:not(:disabled){ color:var(--ink); border-color:var(--ink4); }
.tl-more button:disabled{ opacity:.6; cursor:default; }
.tl-start{ font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink4); padding:var(--s2) 0; }

/* ask the session (persisted composer, reused). A sticky footer: a flex
   sibling of .detail-scroll (never inside it), so it never scrolls out of
   view. flex:0 0 auto keeps it at its natural height; the ask-thread's own
   max-height (below) keeps a long Q&A history from pushing the composer
   input off-screen instead of the window doing so. */
.askblock{ flex:0 0 auto; margin:0 var(--s5); padding:var(--s3) var(--s4); border:1px solid var(--rule); border-left:2px solid var(--s-done); border-radius:var(--r2) var(--r2) 0 0; border-bottom:0; background:var(--panel2); max-height:45vh; display:flex; flex-direction:column; min-height:0; }
.askblock .lh{ display:flex; align-items:center; gap:var(--s3); }
.askblock .lh .lbl{ font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--s-done); font-weight:600; }
.askblock .lh .meta{ font-family:var(--mono); font-size:10px; color:var(--ink4); margin-left:auto; }
.ask-thread{ display:flex; flex-direction:column; gap:var(--s3); margin-top:var(--s3); overflow-y:auto; min-height:0; }
.ask-x{ display:grid; gap:var(--s1); }
.ask-x .tag{ font-family:var(--mono); font-size:8.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--ink4); flex:0 0 44px; padding-top:2px; }
.ask-x .q, .ask-x .a{ display:flex; align-items:flex-start; gap:var(--s2); }
.ask-x .q .txt{ font-size:12.5px; color:var(--ink2); line-height:1.45; }
.ask-x .a{ flex-wrap:wrap; padding-left:var(--s2); border-left:2px solid var(--rule2); }
.ask-x .a .txt{ font-size:13px; color:var(--ink); line-height:1.5; white-space:pre-wrap; flex:1 1 0; min-width:0; overflow-wrap:anywhere; }
.ask-x .a .meta{ font-family:var(--mono); font-size:9px; color:var(--ink4); flex-basis:100%; padding-left:52px; }
.ask-x .a.load .txt{ font-family:var(--mono); font-size:11px; color:var(--ink3); animation:sumpulse 1.6s ease-in-out infinite; }
.ask-x .a.err{ border-left-color:var(--s-block); }
.ask-x .a.err .tag{ color:var(--s-block); }
.ask-x .a.err .txt{ color:var(--ink2); font-size:12px; }
.ask-ctl{ flex:0 0 auto; display:flex; gap:var(--s2); flex-wrap:wrap; margin-top:var(--s3); }
.ask-qp{ font-family:var(--mono); font-size:10px; letter-spacing:.02em; color:var(--ink2); background:transparent; border:1px solid var(--rule2); border-radius:999px; padding:4px 11px; cursor:pointer; transition:.12s; }
.ask-qp:hover{ color:var(--ink); border-color:var(--ink4); }
.ask-qp:disabled{ opacity:.4; cursor:default; }
.ask-in{ flex:0 0 auto; display:flex; gap:var(--s2); margin-top:var(--s2); }
.ask-in input{ flex:1 1 auto; min-width:0; }
.ask-in input:focus{ border-color:var(--s-done); }
.ask-in input:disabled{ opacity:.5; }
.ask-in button{ font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; color:var(--s-done); background:transparent; border:1px solid color-mix(in srgb, var(--s-done) 45%, transparent); border-radius:var(--r1); padding:7px 14px; cursor:pointer; transition:.12s; }
.ask-in button:hover{ background:color-mix(in srgb, var(--s-done) 12%, transparent); }
.ask-in button:disabled{ opacity:.4; cursor:default; }
.ask-ack{ display:flex; align-items:center; gap:var(--s2); flex-wrap:wrap; margin-top:var(--s3); padding:var(--s2) var(--s3);
  border:1px solid color-mix(in srgb, var(--s-need) 35%, transparent); border-radius:var(--r1); background:color-mix(in srgb, var(--s-need) 7%, transparent); }
.ask-ack .txt{ font-size:11.5px; color:var(--ink2); line-height:1.45; flex:1 1 240px; }
.ask-ack button{ font-family:var(--mono); font-size:10px; letter-spacing:.03em; color:var(--ink2); background:transparent; border:1px solid var(--rule2); border-radius:var(--r1); padding:5px 11px; cursor:pointer; transition:.12s; }
.ask-ack button:hover{ color:var(--ink); border-color:var(--ink4); }
.ask-ack button.ok{ color:var(--s-need); border-color:color-mix(in srgb, var(--s-need) 45%, transparent); }
.ask-off{ font-family:var(--mono); font-size:10.5px; color:var(--ink3); margin-top:var(--s3); line-height:1.5; }

/* touched chips (repos + issue keys, session-reader refs only) */
.touched{ display:flex; align-items:center; gap:var(--s2); flex-wrap:wrap; margin-top:var(--s4); }
.touched .touch-l{ font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink4); }
.touch-chip{ font-family:var(--mono); font-size:10px; padding:3px 8px; border-radius:5px; border:1px solid var(--rule2); color:var(--ink2); }
.touch-chip.repo{ color:var(--ink); }
.touch-chip.issue{ color:var(--h-claude); border-color:color-mix(in srgb, var(--h-claude) 35%, transparent); }

/* session details disclosure */
.detail-disc{ margin-top:var(--s4); }
.disc-tog{ font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink3);
  background:none; border:1px dashed var(--rule2); border-radius:var(--r2); padding:7px 12px; width:100%; text-align:left; cursor:pointer; }
.disc-tog:hover{ color:var(--ink); border-color:var(--ink4); }
.disc-grid{ display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--rule); border-radius:var(--r2); margin-top:var(--s2); overflow:hidden; }
.disc-row{ display:flex; align-items:center; justify-content:space-between; gap:var(--s3); padding:var(--s2) var(--s4); border-bottom:1px solid var(--rule); background:var(--panel); }
.disc-row .dk{ font-family:var(--mono); font-size:9.5px; color:var(--ink4); text-transform:uppercase; letter-spacing:.06em; }
.disc-row .dv{ font-family:var(--mono); font-size:11px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ---------- CHIEF-OF-STAFF DRAWER (summonable right overlay; CHAT ONLY.
   The digest block and the resources block that used to live here are
   deleted -- one owner each: digest -> bottom bar, resources -> Metrics.
   Toggled by the header's sidebar-toggle icon button; default closed;
   state persisted via app.set-right-rail. ---------- */
#atlasScrim{ position:fixed; inset:0; z-index:70; background:rgba(4,6,10,.32); opacity:0; pointer-events:none; transition:opacity .2s; }
#atlasScrim.on{ opacity:1; pointer-events:auto; }
body.light #atlasScrim{ background:rgba(30,36,48,.14); }
/* Edge-shadow fix (2026-07 real-use feedback): same bug as .nav-rail above,
   mirrored on the right edge. box-shadow renders past the element's box
   regardless of transform, so this drawer's -24px 0 60px shadow was bleeding
   back into the visible right edge of the window even while fully
   translateX(100%)-hidden (confirmed: removing the shadow alone flattened
   the right-edge darkening at x=1200..1279). Only cast the shadow once the
   drawer is actually open (.on). */
#atlasDrawer{ position:fixed; top:0; right:0; bottom:0; width:340px; max-width:90vw; z-index:75;
  background:var(--bg2); border-left:1px solid var(--rule2); box-shadow:none;
  transform:translateX(100%); transition:transform .24s cubic-bezier(.2,.7,.2,1); display:flex; flex-direction:column; }
#atlasDrawer.on{ transform:translateX(0); box-shadow:-24px 0 60px -12px rgba(0,0,0,.6); }
.atlas-hd{ height:44px; flex:0 0 auto; display:flex; align-items:center; gap:var(--s2); padding:0 var(--s4); border-bottom:1px solid var(--rule); }
.atlas-hd .glyph{ font-size:15px; }
.atlas-hd .ttl{ font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--iris); font-weight:600; }
.atlas-hd .close{ margin-left:auto; font-family:var(--mono); font-size:15px; line-height:1; color:var(--ink3); background:transparent; border:1px solid var(--rule2); border-radius:6px; width:26px; height:26px; cursor:pointer; }
.atlas-hd .close:hover{ color:var(--ink); border-color:var(--rule2); }
#atlasBody{ flex:1 1 auto; overflow-y:auto; padding:var(--s4); display:flex; flex-direction:column; }
.sec-l{ font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink3); font-weight:600; margin-bottom:var(--s2); display:flex; align-items:center; }
.sec-l .ct{ margin-left:auto; color:var(--ink4); }
.atlas-chat{ display:flex; flex-direction:column; gap:var(--s3); flex:1 1 auto; min-height:0; }
.achat-thread{ display:flex; flex-direction:column; gap:var(--s3); flex:1 1 auto; overflow-y:auto; }
.achat-x{ display:grid; gap:6px; }
.achat-x .q{ font-size:12px; color:var(--ink2); }
.achat-x .a{ font-size:12.5px; color:var(--ink); line-height:1.5; padding-left:var(--s2); border-left:2px solid var(--iris-dim); white-space:pre-wrap; }
.achat-x .a.load{ font-family:var(--mono); font-size:11px; color:var(--ink3); }
.achat-x .a.err{ border-left-color:var(--s-block); color:var(--ink2); }
.achat-x .meta{ font-family:var(--mono); font-size:9px; color:var(--ink4); padding-left:var(--s2); }
.achat-in{ display:flex; gap:6px; margin-top:var(--s3); flex:0 0 auto; }
.achat-in input{ flex:1 1 auto; min-width:0; }
.achat-in button{ font-family:var(--mono); font-size:10px; color:var(--iris); background:transparent; border:1px solid var(--iris-dim); border-radius:var(--r1); padding:6px 12px; cursor:pointer; }
.achat-in button:disabled{ opacity:.4; cursor:default; }
.achat-empty{ font-family:var(--mono); font-size:10.5px; color:var(--ink4); line-height:1.6; }

/* ---------- BOTTOM CONTEXT BAR (returns as the SOLE home for: the fleet
   digest, Codex quota + Claude quota, and the selected session's context-fill
   %). Calm, single line, mono. ---------- */
.ctxbar{ height:var(--ctxbar-h); flex:0 0 auto; display:flex; align-items:center; gap:var(--s4);
  padding:0 var(--s4); background:var(--bg2); border-top:1px solid var(--rule);
  font-family:var(--mono); font-size:10.5px; color:var(--ink3); white-space:nowrap; overflow:hidden;
  transition:margin-left .16s cubic-bezier(.2,.7,.2,1); }
.ctxbar .cb-digest{ flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; font-family:var(--disp); font-size:11.5px; letter-spacing:-.005em; }
.ctxbar .cb-digest b{ color:var(--ink); font-weight:600; }
.ctxbar .cb-sep{ width:1px; height:14px; background:var(--rule2); flex:0 0 auto; }
.ctxbar .cb-item{ flex:0 0 auto; display:flex; align-items:center; gap:5px; cursor:default; }
.ctxbar .cb-item .dt{ width:5px; height:5px; border-radius:50%; background:var(--s-idle); }
.ctxbar .cb-item.q-amber .dt{ background:var(--s-need); }
.ctxbar .cb-item.q-amber{ color:var(--s-need); }
.ctxbar .cb-item.q-red .dt{ background:var(--s-block); }
.ctxbar .cb-item.q-red{ color:var(--s-block); }
.ctxbar .cb-item.q-na{ color:var(--ink4); }

/* custom right-click context menu */
.ctxmenu{ position:fixed; z-index:90; min-width:190px; background:var(--panel2); border:1px solid var(--rule2); border-radius:var(--r2);
  box-shadow:0 16px 40px -8px rgba(0,0,0,.55); padding:4px; }
.ctxmenu[hidden]{ display:none; }
.ctxitem{ display:flex; align-items:center; gap:var(--s2); font-size:12.5px; color:var(--ink); padding:7px 10px; border-radius:6px; cursor:pointer; white-space:nowrap; }
.ctxitem .k2{ margin-left:auto; font-family:var(--mono); font-size:9px; color:var(--ink4); }
.ctxitem:hover, .ctxitem.hi{ background:var(--iris); color:#0a0c10; }
body.light .ctxitem:hover, body.light .ctxitem.hi{ color:#fff; }
.ctxitem:hover .k2, .ctxitem.hi .k2{ color:inherit; opacity:.75; }
.ctxsep{ height:1px; background:var(--rule); margin:4px 2px; }

/* Dot tooltip (2026-07 real-use feedback: "state dots are unclear"). One
   shared, pure-CSS, zero-JS component: any element carrying data-tip shows a
   small bespoke tooltip on hover/focus, consistent with the app's mono/panel
   language instead of the browser's native unstyled title box. Applied to
   the unread dot, the harness glyph, and every state chip's dot (the dot
   itself, not just its neighboring text, so a dot alone is still
   self-explaining). Delayed slightly so it does not flicker on fast mouse
   travel across a dense row list; instant enough to read as responsive. */
[data-tip]{ position:relative; }
[data-tip]::after{
  content:attr(data-tip); position:absolute; left:50%; bottom:calc(100% + 7px); transform:translateX(-50%) translateY(2px);
  font-family:var(--mono); font-size:10.5px; line-height:1.4; color:var(--ink); background:var(--panel2);
  border:1px solid var(--rule2); border-radius:var(--r1); padding:5px 9px; white-space:nowrap; max-width:260px;
  box-shadow:0 10px 24px rgba(0,0,0,.4); pointer-events:none; z-index:90;
  opacity:0; transition:opacity .1s ease .35s, transform .1s ease .35s;
}
[data-tip]:hover::after, [data-tip]:focus-visible::after{ opacity:1; transform:translateX(-50%) translateY(0); }
/* Rows near the left edge would clip a centered tooltip against the nav hot
   edge; anchor those to the left instead of centering. */
[data-tip].tip-left::after{ left:0; transform:translateX(0) translateY(2px); }
[data-tip].tip-left:hover::after, [data-tip].tip-left:focus-visible::after{ transform:translateX(0) translateY(0); }

/* toast */
#toast{ position:fixed; left:50%; bottom:var(--s5); transform:translateX(-50%) translateY(140%); z-index:95;
  font-family:var(--mono); font-size:11px; color:var(--ink); background:var(--panel2); border:1px solid var(--rule2);
  border-radius:var(--r2); padding:9px 15px; box-shadow:0 12px 30px rgba(0,0,0,.45); opacity:0;
  transition:transform .24s cubic-bezier(.2,.7,.2,1), opacity .18s; max-width:520px; }
#toast.on{ transform:translateX(-50%) translateY(0); opacity:1; }

::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-thumb{ background:var(--rule2); border-radius:8px; }
::-webkit-scrollbar-track{ background:transparent; }
/* prefers-reduced-motion is declared once, in the a11y-base stylesheet above
   (loaded right after tokens, ahead of every component style here), so every
   transition/animation in this file is already gated by it. */
</style>
</head>
<body>

<div class="app">

  <!-- ===== HEADER (slim: wordmark + version + sidebar-toggle icon only.
       Digest, resources, and theme/settings controls do not live here --
       see DESIGN.md signal-ownership table. ===== -->
  <header class="hdr">
    <div class="brand">
      <span class="mk">human<b>ctl</b></span>
      <span class="tag" id="verTag">home</span>
      <span class="demo" id="demoBadge" style="display:none">demo &middot; fixture</span>
    </div>
    <div class="spacer"></div>
    <div class="ctl">
      <button id="btnRightRail" class="icon-btn" title="chief-of-staff chat (a)" aria-label="toggle chief-of-staff chat">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M10.5 2.5V13.5" stroke="currentColor" stroke-width="1.3"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== STAGE: one active view; the nav strip and CoS drawer are overlays ===== -->
  <div class="stage">

    <!-- INBOX (default) -->
    <section class="view" id="view-inbox"></section>
    <!-- METRICS -->
    <section class="view" id="view-metrics"></section>
    <!-- FLEET (0.17 placeholder) -->
    <section class="view" id="view-fleet"></section>
    <!-- SESSIONS (complete-fleet list; replaces Wall) -->
    <section class="view" id="view-sessions"></section>
    <!-- SETTINGS -->
    <section class="view" id="view-settings"></section>

    <!-- SESSION DETAIL (full-width overlay over the active view) -->
    <div id="detailWrap"><div class="detail" id="detailBody"></div></div>

  </div>

  <!-- ===== BOTTOM CONTEXT BAR: sole home for the fleet digest, both quotas,
       and the selected session's context-fill %. ===== -->
  <footer class="ctxbar" id="ctxBar"></footer>
</div>

<!-- nav strip: a VISIBLE icon strip by default (hover to expand labels, Cmd+\ to pin) -->
<nav class="nav-rail" id="navRail" aria-label="views"></nav>

<!-- user / settings picker popover (anchored at the foot of the nav strip) -->
<!-- role="group" (not "menu"): this popover mixes toggle buttons and a number
     input, which a real menu's assistive-tech contract does not expect to
     contain (a menu's children must be menuitems). -->
<div class="picker" id="userPicker" hidden role="group" aria-label="Theme and settings"></div>

<!-- chief-of-staff drawer (summonable right overlay; key a or the header icon). Chat only. -->
<div id="atlasScrim"></div>
<aside id="atlasDrawer" aria-label="Chief of staff" role="dialog" aria-modal="true">
  <div class="atlas-hd"><span class="glyph">&#129517;</span><span class="ttl">Chief of staff</span>
    <button class="close" id="atlasClose" aria-label="close chief-of-staff chat">&times;</button>
  </div>
  <div id="atlasBody"></div>
</aside>

<!-- custom right-click context menu (registry-driven; never bypasses it) -->
<div id="ctxmenu" class="ctxmenu" hidden role="menu"></div>

<!-- action toast -->
<div id="toast"></div>

<!-- No build step: plain script tags, dependency order. renderer.js owns shared
     state/utils/views/detail; atlas.js the summonable drawer; inbox.js the Inbox
     v2 view; contextmenu.js the custom menu; boot.js calls load() last. -->
<script src="./hc-select.js"></script>
<script src="./renderer.js"></script>
<script src="./atlas.js"></script>
<script src="./inbox.js"></script>
<script src="./contextmenu.js"></script>
<script src="./boot.js"></script>
</body>
</html>
