<title>humanctl</title>

  .pin svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round} .pin.on svg{fill:currentColor}
  .empty,.err{padding:36px 18px;font-family:var(--mono);font-size:12px;color:var(--ink-3)} .err{color:var(--fail)}

  .sumbtn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:1.8} .sumbtn:hover{color:var(--iris-2);border-color:var(--iris)}

  .sq.f2{background-image:radial-gradient(circle 1.4px at 30% 30%,var(--pip) 98%,transparent),radial-gradient(circle 1.4px at 70% 70%,var(--pip) 98%,transparent)}
  .sq.f3{background-image:radial-gradient(circle 1.4px at 28% 28%,var(--pip) 98%,transparent),radial-gradient(circle 1.4px at 50% 50%,var(--pip) 98%,transparent),radial-gradient(circle 1.4px at 72% 72%,var(--pip) 98%,transparent)}

  .sq.f5{background-image:radial-gradient(circle 1.4px at 28% 28%,var(--pip) 98%,transparent),radial-gradient(circle 1.4px at 72% 28%,var(--pip) 98%,transparent),radial-gradient(circle 1.4px at 50% 50%,var(--pip) 98%,transparent),radial-gradient(circle 1.4px at 28% 72%,var(--pip) 98%,transparent),radial-gradient(circle 1.4px at 72% 72%,var(--pip) 98%,transparent)}

</head>

  </header>
  <div class="tabs" id="tabs"></div>
  <div class="controls hidden" id="controls" style="display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--rule)">
    <button class="aibtn" data-filter="all" style="border-radius:999px">all</button>
    <button class="aibtn" data-filter="needs" style="border-radius:999px">needs you</button>
    <button class="aibtn" data-filter="working" style="border-radius:999px">working</button>
    <button class="aibtn" data-filter="codex" style="border-radius:999px">codex</button>
    <button class="aibtn" data-filter="claude-code" style="border-radius:999px">claude</button>
    <button class="aibtn" data-filter="pinned" style="border-radius:999px">pinned</button>
    <span class="spacer"></span>
    <button class="aibtn" id="spotcheck" style="border-radius:8px" title="open a random session to spot-check a 'green' lane">spot-check</button>
    <span class="est" id="count" style="font-family:var(--mono);font-size:10.5px;color:var(--ink-4)"></span>
    <input id="search" type="text" placeholder="filter" spellcheck="false" autocomplete="off" style="font-family:var(--mono);font-size:11px;color:var(--ink);background:var(--bg-3);border:1px solid var(--rule-2);border-radius:7px;padding:5px 10px;width:200px;outline:none" />
  </div>
  <main>
    <div id="inbox"></div>
    <div id="list"><div class="empty">loading...</div></div>
    <div id="detail" class="detail hidden"></div>
  </main>
  <div class="statusbar" id="statusbar"></div>
  <div class="ctip" id="ctip"></div>
  <script src="./renderer.js"></script>
</body>
</html>
